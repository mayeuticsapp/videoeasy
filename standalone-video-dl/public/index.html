<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Downloader</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Video DL" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }
    .wrap { width: 100%; max-width: 420px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo {
      width: 42px; height: 42px; border-radius: 12px;
      background: #00FF85; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo svg { width: 22px; height: 22px; }
    .title { font-size: 20px; font-weight: 700; }
    .subtitle { font-size: 12px; color: #555; margin-top: 2px; }

    .input-box {
      display: flex; align-items: center; gap: 10px;
      background: #111; border: 1px solid #222; border-radius: 18px;
      padding: 12px 16px; margin-bottom: 12px;
    }
    .input-box svg { width: 16px; height: 16px; color: #555; flex-shrink: 0; }
    .input-box input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #fff; font-size: 14px;
    }
    .input-box input::placeholder { color: #444; }
    .clear-btn {
      background: none; border: none; color: #444; cursor: pointer; padding: 2px; line-height: 0;
    }
    .clear-btn:hover { color: #888; }

    .btn-main {
      width: 100%; padding: 14px; border-radius: 18px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s;
    }
    .btn-main:disabled { opacity: 0.5; cursor: default; }
    .btn-green { background: #00FF85; color: #000; }
    .btn-dark { background: #1a1a1a; color: #444; }

    .btn-secondary {
      flex: 1; padding: 10px 12px; border-radius: 12px;
      border: 1px solid #2a2a2a; background: #111; color: #aaa;
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: #1a1a1a; }
    .btn-secondary:disabled { opacity: 0.5; cursor: default; }

    .btn-text {
      width: 100%; padding: 8px; background: none; border: none;
      color: #444; font-size: 12px; cursor: pointer; margin-top: 4px;
    }
    .btn-text:hover { color: #888; }

    .error-box {
      margin-top: 16px; padding: 14px 16px;
      background: #1a0505; border: 1px solid #5a1a1a;
      border-radius: 16px; color: #f87171; font-size: 13px; line-height: 1.5;
    }
    .card {
      margin-top: 16px; background: #111; border: 1px solid #222;
      border-radius: 18px; overflow: hidden;
    }
    .thumb-wrap { position: relative; }
    .thumb-wrap img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .duration-badge {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.8); color: #fff;
      font-size: 11px; padding: 2px 8px; border-radius: 6px;
      font-family: monospace;
    }
    .card-body { padding: 14px 16px 4px; }
    .video-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
    .uploader { font-size: 12px; color: #555; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .badge {
      font-size: 10px; padding: 2px 10px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-gray { background: #1a1a1a; color: #666; }
    .badge-green { background: rgba(0,255,133,0.1); color: #00FF85; }
    .badge-auto { background: rgba(255,255,255,0.05); color: #888; }

    .card-actions { padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 8px; }
    .sub-row { display: flex; gap: 8px; }
    select.lang-sel {
      background: #1a1a1a; color: #aaa; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 8px 12px; font-size: 12px; outline: none;
      flex-shrink: 0;
    }

    .platforms { margin-top: 32px; text-align: center; }
    .platforms p { font-size: 12px; color: #333; margin-bottom: 10px; }
    .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
    .tag {
      font-size: 11px; background: #0a0a0a; color: #444;
      padding: 4px 12px; border-radius: 999px; border: 1px solid #1a1a1a;
    }
    .counters {
      display: flex; justify-content: center; gap: 24px;
      margin-top: 20px; padding-top: 20px; border-top: 1px solid #111;
    }
    .counter-item { text-align: center; }
    .counter-num { font-size: 20px; font-weight: 700; color: #00FF85; }
    .counter-lbl { font-size: 10px; color: #444; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2);
      border-top-color: currentColor; border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
        <line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/>
        <line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/>
        <line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/>
        <line x1="17" y1="7" x2="22" y2="7"/>
      </svg>
    </div>
    <div>
      <div class="title">Video Downloader</div>
      <div class="subtitle">YouTube, Instagram, TikTok e altri</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    <input id="urlInput" type="url" placeholder="Incolla il link del video..." autocomplete="off" />
    <button class="clear-btn hidden" id="clearBtn" onclick="clearAll()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Analizza btn -->
  <button class="btn-main btn-dark" id="analyzeBtn" onclick="analyzeVideo()">Analizza video</button>

  <!-- Error -->
  <div class="error-box hidden" id="errorBox"></div>

  <!-- Card -->
  <div class="card hidden" id="card">
    <div class="thumb-wrap">
      <img id="thumb" src="" alt="" onerror="this.style.display='none'" />
      <span class="duration-badge hidden" id="duration"></span>
    </div>
    <div class="card-body">
      <div class="video-title" id="videoTitle"></div>
      <div class="uploader" id="uploader"></div>
      <div class="badges" id="badges"></div>
    </div>
    <div class="card-actions">
      <button class="btn-main btn-green" id="dlBtn" onclick="downloadVideo()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Scarica MP4
      </button>
      <div class="sub-row hidden" id="subRow">
        <select class="lang-sel" id="langSel"></select>
        <button class="btn-secondary" id="subBtn" onclick="downloadSubs()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          Scarica sottotitoli .txt
        </button>
      </div>
      <button class="btn-text" onclick="clearAll()">Nuovo video</button>
    </div>
  </div>

  <!-- Piattaforme -->
  <div class="platforms" id="platforms">
    <p>Siti supportati</p>
    <div class="tags">
      <span class="tag">YouTube</span><span class="tag">Instagram</span>
      <span class="tag">TikTok</span><span class="tag">Facebook</span>
      <span class="tag">Twitter/X</span><span class="tag">Vimeo</span>
      <span class="tag">Reddit</span><span class="tag">+1000 altri</span>
    </div>
    <div class="counters" id="counters"></div>
  </div>
</div>

<script>
  let currentUrl = "";
  let currentTitle = "";

  fetch("/api/visit", { method: "POST" }).catch(() => {});

  fetch("/api/stats").then(r => r.json()).then(data => {
    const el = document.getElementById("counters");
    if (el) el.innerHTML = `
      <div class="counter-item">
        <div class="counter-num">${data.visits.toLocaleString("it-IT")}</div>
        <div class="counter-lbl">Visite</div>
      </div>
      <div class="counter-item">
        <div class="counter-num">${data.downloads.toLocaleString("it-IT")}</div>
        <div class="counter-lbl">Download</div>
      </div>
    `;
  }).catch(() => {});

  const urlInput = document.getElementById("urlInput");
  const clearBtn = document.getElementById("clearBtn");
  const analyzeBtn = document.getElementById("analyzeBtn");
  const errorBox = document.getElementById("errorBox");
  const card = document.getElementById("card");
  const platforms = document.getElementById("platforms");
  const dlBtn = document.getElementById("dlBtn");
  const subBtn = document.getElementById("subBtn");

  urlInput.addEventListener("input", () => {
    clearBtn.classList.toggle("hidden", !urlInput.value);
    if (urlInput.value) {
      analyzeBtn.className = "btn-main btn-green";
    } else {
      analyzeBtn.className = "btn-main btn-dark";
    }
  });

  urlInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") analyzeVideo();
  });

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.remove("hidden");
  }

  function hideError() {
    errorBox.classList.add("hidden");
  }

  function clearAll() {
    urlInput.value = "";
    clearBtn.classList.add("hidden");
    analyzeBtn.className = "btn-main btn-dark";
    card.classList.add("hidden");
    hideError();
    platforms.classList.remove("hidden");
    currentUrl = "";
    currentTitle = "";
  }

  function formatDuration(secs) {
    if (!secs) return "";
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    return `${m}:${String(s).padStart(2,"0")}`;
  }

  function setLoading(btn, loading, defaultContent) {
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = `<div class="spinner"></div> Attendere...`;
    } else {
      btn.disabled = false;
      btn.innerHTML = defaultContent;
    }
  }

  async function fetchWithRetry(url, maxRetries = 3, delayMs = 8000) {
    for (let i = 0; i < maxRetries; i++) {
      const res = await fetch(url);
      const ct = res.headers.get("content-type") || "";
      if (!ct.includes("application/json")) {
        if (i < maxRetries - 1) {
          showError(`Server in avvio, riprovo tra ${delayMs / 1000} secondi... (${i + 1}/${maxRetries})`);
          await new Promise(r => setTimeout(r, delayMs));
          continue;
        }
        throw new Error("Il server sta partendo. Riprova tra 30 secondi.");
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Errore sconosciuto");
      return data;
    }
  }

  async function analyzeVideo() {
    const url = urlInput.value.trim();
    if (!url) return;
    currentUrl = url;
    hideError();
    card.classList.add("hidden");
    platforms.classList.add("hidden");

    setLoading(analyzeBtn, true, "Analizza video");

    try {
      const data = await fetchWithRetry(`/api/info?url=${encodeURIComponent(url)}`);

      // Popola card
      currentTitle = data.title || "";
      document.getElementById("thumb").src = data.thumbnail || "";
      document.getElementById("videoTitle").textContent = data.title || "";
      document.getElementById("uploader").textContent = data.uploader || "";

      const dur = formatDuration(data.duration);
      const durEl = document.getElementById("duration");
      if (dur) { durEl.textContent = dur; durEl.classList.remove("hidden"); }
      else durEl.classList.add("hidden");

      // Badges
      const badges = document.getElementById("badges");
      badges.innerHTML = "";
      if (data.extractor) {
        const b = document.createElement("span");
        b.className = "badge badge-gray";
        b.textContent = data.extractor;
        badges.appendChild(b);
      }
      if (data.hasSubtitles) {
        const b = document.createElement("span");
        b.className = data.subtitleType === "manual" ? "badge badge-green" : "badge badge-auto";
        b.textContent = data.subtitleType === "manual" ? "Sottotitoli manuali" : "Sottotitoli auto";
        badges.appendChild(b);
      }

      // Sottotitoli
      const subRow = document.getElementById("subRow");
      const langSel = document.getElementById("langSel");
      if (data.hasSubtitles && data.subLangs && data.subLangs.length > 0) {
        langSel.innerHTML = "";
        const langs = [...new Set([...data.subLangs, "it", "en"])];
        langs.slice(0, 8).forEach(l => {
          const opt = document.createElement("option");
          opt.value = l;
          opt.textContent = l.toUpperCase();
          langSel.appendChild(opt);
        });
        if (data.subLangs.includes("it")) langSel.value = "it";
        else langSel.value = data.subLangs[0];
        subRow.classList.remove("hidden");
      } else {
        subRow.classList.add("hidden");
      }

      card.classList.remove("hidden");
    } catch (e) {
      showError(e.message);
      platforms.classList.remove("hidden");
    } finally {
      setLoading(analyzeBtn, false, "Analizza video");
      analyzeBtn.className = "btn-main btn-green";
    }
  }

  async function downloadVideo() {
    if (!currentUrl) return;
    const defaultContent = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Scarica MP4`;
    setLoading(dlBtn, true, defaultContent);
    hideError();
    try {
      const res = await fetch(`/api/download?url=${encodeURIComponent(currentUrl)}&title=${encodeURIComponent(currentTitle)}`);
      if (!res.ok) {
        const data = await res.json().catch(() => ({ error: "Errore server" }));
        throw new Error(data.error || "Download fallito");
      }
      const blob = await res.blob();
      const disposition = res.headers.get("Content-Disposition") || "";
      const match = disposition.match(/filename="([^"]+)"/);
      const filename = match ? decodeURIComponent(match[1]) : "video.mp4";
      const objectUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = objectUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(objectUrl), 5000);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(dlBtn, false, defaultContent);
    }
  }

  async function downloadSubs() {
    if (!currentUrl) return;
    const lang = document.getElementById("langSel").value;
    const defaultContent = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Scarica sottotitoli .txt`;
    hideError();
    setLoading(subBtn, true, defaultContent);
    try {
      const res = await fetch(`/api/subtitles?url=${encodeURIComponent(currentUrl)}&lang=${lang}`);
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || "Errore sottotitoli");
      }
      const blob = await res.blob();
      const disposition = res.headers.get("Content-Disposition") || "";
      const match = disposition.match(/filename="([^"]+)"/);
      const filename = match ? decodeURIComponent(match[1]) : "sottotitoli.txt";
      const objectUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = objectUrl;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(objectUrl);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(subBtn, false, defaultContent);
    }
  }
</script>
</body>
</html>
